<section class="login-page">
    <div class="login-form-container">
        <div class="login-form-wrapper">
            <svg class="floating-shape" viewBox="0 0 200 200">
                <path fill="currentColor"
                    d="M100 0l20 20 10 10-20-20-10-10zm0 200l20-20-10-10-20 20 10 10zm-20-100l20 20-20 20-20-20 20-20zm100 20l-20-20-10 10 20 20 10-10zm-20 20l20 20-20 20-20-20 20-20z" />
            </svg>

            <div class="glass-card">
                <div class="logo-container">
                </div>

                <h2 class="title">Sign in to your account</h2>

                <form class="login-form" (ngSubmit)="onSubmit()">
                    <div class="input-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" [(ngModel)]="email" name="email" required class="premium-input"
                            placeholder="Enter your email" />
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" [(ngModel)]="password" name="password" required
                            class="premium-input" placeholder="Enter your password" />
                    </div>

                    <div class="form-actions">
                        <div class="remember-me">
                            <input id="remember-me" name="remember-me" type="checkbox" />
                            <label for="remember-me">Remember me</label>
                        </div>
                    </div>

                    <div class="submit-container">
                        <button type="submit" class="premium-button">
                            Sign in
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="animated-gradient-bg">
        <div class="marketing-content">
            <div class="icon-container">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                    </path>
                </svg>
            </div>
            <h2>Welcome back</h2>
            <p>Manage your appointments with ease.</p>
        </div>
    </div>
</section>
