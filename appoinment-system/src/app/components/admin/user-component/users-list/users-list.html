<div class="container-fluid p-3">
    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
        <h2 class="fw-bold text-dark text-uppercase mb-0 tracking-tight" style="font-size: 1.5rem;">Manage Users</h2>
        <p-button (click)="openNew()" severity="success" [raised]="true">
            <i class="pi pi-plus me-md-2"></i>
            <span class="d-none d-md-inline">New User</span>
        </p-button>
    </div>

    <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
        <p-table [value]="users" [tableStyle]="{ 'min-width': '50rem' }" [rows]="10" [paginator]="true">
            <ng-template #header>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </ng-template>
            <ng-template #body let-user>
                <tr>
                    <td class="font-medium">{{ user.name }}</td>
                    <td>{{ user.email }}</td>
                    <td>
                        <p-tag [value]="user.role" [severity]="getRoleSeverity(user.role)"></p-tag>
                    </td>
                    <td>
                        <p-tag [value]="user.isActive ? 'Active' : 'Inactive'" [severity]="user.isActive ? 'success' : 'secondary'"></p-tag>
                    </td>
                    <td>
                        <div class="flex gap-2">
                            <p-button icon="pi pi-eye" [rounded]="true" [text]="true" severity="info" (click)="viewUser(user)"></p-button>
                            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="success" (click)="editUser(user)"></p-button>
                            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (click)="deleteUser(user)"></p-button>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
