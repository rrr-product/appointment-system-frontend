<div class="container-fluid p-3">
    <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
        <!-- Header -->
        <div class="card-header bg-white border-bottom-0 pt-4 px-4 pb-0">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <!-- <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-1" style="--bs-breadcrumb-divider: '/'; font-size: 0.75rem;">
                            <li class="breadcrumb-item"><a href="#" class="text-secondary text-decoration-none">Home</a>
                            </li>
                            <li class="breadcrumb-item"><a href="#"
                                    class="text-secondary text-decoration-none">Services</a></li>
                            <li class="breadcrumb-item active" aria-current="page">New Service</li>
                        </ol>
                    </nav> -->
                    <h4 class="fw-bold text-dark text-uppercase mb-0 tracking-tight" style="font-size: 1.25rem;">
                        <span class="text-primary hover:text-primary-emphasis transition-colors" (click)="cancel()"
                            style="cursor: pointer;">Service</span>
                        :: {{ isEditMode ? 'Edit' : 'Create' }}
                    </h4>
                </div>
                <p-button (click)="save()" severity="success" size="small" [raised]="true">
                    <i class="pi pi-save me-md-2"></i>
                    <span class="d-none d-md-inline">Save Service</span>
                </p-button>
            </div>
        </div>

        <div class="card-body p-4">
            <div class="row g-4">
                <div class="col-12">
                    <label for="name" class="form-label text-secondary fw-bold text-uppercase"
                        style="font-size: 0.7rem; letter-spacing: 0.1em;">Service Name</label>
                    <input type="text" class="form-control py-2 shadow-none border-secondary-subtle" id="name"
                        [(ngModel)]="service.name" placeholder="e.g. Premium Business Consulting" autocomplete="off">
                    @if(submitted && !service.name){
                    <div class="text-danger small mt-1">Name is required.</div>
                    }
                </div>

                <div class="col-12">
                    <label for="description" class="form-label text-secondary fw-bold text-uppercase"
                        style="font-size: 0.7rem; letter-spacing: 0.1em;">Description</label>
                    <textarea class="form-control py-2 shadow-none border-secondary-subtle" id="description"
                        [(ngModel)]="service.description" rows="4"
                        placeholder="Describe what this service entails for your clients..."></textarea>
                </div>

                <div class="col-md-6">
                    <label for="price" class="form-label text-secondary fw-bold text-uppercase"
                        style="font-size: 0.7rem; letter-spacing: 0.1em;">Price</label>
                    <p-inputNumber id="price" [(ngModel)]="service.price" mode="currency" currency="USD" locale="en-US"
                        inputStyleClass="form-control py-2 shadow-none border-secondary-subtle"
                        styleClass="w-100"></p-inputNumber>
                </div>

                <div class="col-md-6">
                    <label for="duration" class="form-label text-secondary fw-bold text-uppercase"
                        style="font-size: 0.7rem; letter-spacing: 0.1em;">Duration</label>
                    <p-inputNumber id="duration" [(ngModel)]="service.durationMinutes" suffix=" mins"
                        inputStyleClass="form-control py-2 shadow-none border-secondary-subtle"
                        styleClass="w-100"></p-inputNumber>
                </div>

                <div class="col-12">
                    <div class="p-3 bg-light rounded-3 border border-light-subtle d-flex align-items-center gap-3">
                        <p-checkbox [(ngModel)]="service.isActive" [binary]="true" inputId="active"></p-checkbox>
                        <div>
                            <label for="active" class="fw-bold text-dark d-block mb-0"
                                style="font-size: 0.9rem; cursor: pointer;">Active Status</label>
                            <small class="text-secondary">Visible to clients for public booking.</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- <div class="card-footer bg-light border-top-0 p-4 d-flex justify-content-end gap-2">
            <p-button label="Cancel" [text]="true" severity="secondary" (click)="cancel()"></p-button>
            <p-button label="Save Service" (click)="save()" severity="success" [raised]="true"></p-button>
        </div> -->
    </div>
</div>
