<div class="toolbar-container" style="padding: 1rem 2rem;">
    <p-toolbar [style]="{ 'border-radius': '3rem', padding: '0.75rem 1rem 0.75rem 1.5rem' }">
        <ng-template #start>
            <div class="flex items-center gap-2 brand-section">
                <span style="font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; margin-right: 1.5rem; color: var(--p-primary-color);">AB</span>
                <p-menu #menu [model]="items" [popup]="true" />
                <p-button (click)="menu.toggle($event)" icon="pi pi-bars" label="Menu" text plain />
            </div>
        </ng-template>

        <ng-template #end>
            <div class="flex items-center gap-3">
                <p-button icon="pi pi-power-off" [rounded]="true" severity="contrast" size="small" />
            </div>
        </ng-template>
    </p-toolbar>
</div>
